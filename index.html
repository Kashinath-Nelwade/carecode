<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareCode - Generate Your Health QR</title>
    <link rel="stylesheet" href="style.css">
    <!-- Adding QR code library -->
    <script src="qrcode.js"></script>
</head>
<body>
    <header>
        <h1>CareCode</h1>
        <p>Your medical information in one scan</p>
    </header>
    
    <nav>
        <ul>
            <li><a href="index.html" class="active">Generate QR</a></li>
            <li><a href="view.html">View Data</a></li>
        </ul>
    </nav>
    
    <main>
        <section class="form-section">
            <h2>Enter Your Information</h2>
            <form id="userForm">
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" required>
                </div>
                
                <div class="form-group">
                    <label for="dob">Date of Birth</label>
                    <input type="date" id="dob" required>
                </div>
                
                <div class="form-group">
                    <label for="bloodType">Blood Type</label>
                    <select id="bloodType" required>
                        <option value="">Select</option>
                        <option value="A+">A+</option>
                        <option value="A-">A-</option>
                        <option value="B+">B+</option>
                        <option value="B-">B-</option>
                        <option value="AB+">AB+</option>
                        <option value="AB-">AB-</option>
                        <option value="O+">O+</option>
                        <option value="O-">O-</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="allergies">Allergies (comma separated)</label>
                    <input type="text" id="allergies" placeholder="e.g., Penicillin, Nuts">
                </div>
                
                <div class="form-group">
                    <label for="conditions">Medical Conditions</label>
                    <textarea id="conditions" rows="3" placeholder="Any chronic conditions or disabilities"></textarea>
                </div>
                
                <div class="form-group">
                    <label for="emergencyContact">Emergency Contact</label>
                    <input type="text" id="emergencyContact" placeholder="Name and phone number">
                </div>
                
                <div class="form-group">
                    <label for="medications">Current Medications</label>
                    <textarea id="medications" rows="3" placeholder="List of current medications"></textarea>
                </div>
                
                <button type="submit" class="submit-btn">Generate QR Code</button>
            </form>
        </section>
        
        <section class="qr-section" id="qrSection" style="display: none;">
            <h2>Your CareCode QR</h2>
            <div id="qrcode"></div>
            <p class="instructions">Scan this QR code to access your medical information</p>
            <button id="downloadBtn" class="download-btn">Download QR Code</button>
            <button id="newCodeBtn" class="new-btn">Create New Code</button>
        </section>
    </main>
    
    <footer>
        <p>CareCode &copy; 2023 | Always carry your medical information with you</p>
    </footer>
    
    <script src="script.js"></script>
</body>
</html>
